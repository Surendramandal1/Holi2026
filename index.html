
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi</title>
<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #ff0080, #ffcc00, #00ffcc, #6600ff);
    background-size: 400% 400%;
    animation: gradientBG 8s ease infinite;
    overflow: hidden;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

h1 {
    font-size: 70px;
    color: white;
    margin-top: 20%;
    text-shadow: 3px 3px 10px black;
    cursor: pointer;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.1);}
    100% {transform: scale(1);}
}

input {
    padding: 10px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: yellow;
    cursor: pointer;
}

.gulal {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    0% {transform: translateY(-100px);}
    100% {transform: translateY(100vh);}
}
</style>
</head>
<body>

<h1 onclick="blast()">ðŸŒ¸ Happy Holi ðŸŒ¸</h1>

<input type="text" id="name" placeholder="Apna naam likhiye">
<br><br>
<button onclick="showWish()">Wish Dekho</button>

<h2 id="wish" style="color:white;"></h2>

<script>
function showWish() {
    var name = document.getElementById("name").value;
    if(name === ""){
        alert("Pehle apna naam likhiye ðŸ˜„");
    } else {
        document.getElementById("wish").innerHTML = 
         name + " ki taraf se aapko Happy Holi ";
    }
}

function blast() {
    for(let i=0;i<100;i++){
        let gulal = document.createElement("div");
        gulal.className = "gulal";
        gulal.style.left = Math.random() * window.innerWidth + "px";
        gulal.style.background = 
        "hsl(" + Math.random()*360 + ", 100%, 50%)";
        gulal.style.animationDuration = (Math.random()*3+2) + "s";
        document.body.appendChild(gulal);
    }
}
</script>

</body>
</html>
